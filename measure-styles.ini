[Rainmeter]
Update=1000

[TextsStyle]
FontFace=Consolas
FontSize=18
FontColor=255,255,255
AntiAlias=1

[MeasureTime]
Measure=Time
Format=%I:%M:%S

[MeasureDate]
Measure=Time
Format=%A, %d/%B/%Y
UpdateDivider=60

[MeasureCPU]
Measure=CPU

[MeterTime]
Meter=String
MeterStyle=TextsStyle
MeasureName=MeasureTime
Text=Hora: %1
Y=35

[MeterDate]
Meter=String
MeterStyle=TextsStyle
MeasureName=MeasureDate

[MeterCPU]
Meter=String
MeterStyle=TextsStyle
MeasureName=MeasureCPU
Y=75
Text=CPU: %1%